<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>التوظيف — Sulimet Câblage Maroc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#C8102E;
    --red-dark:#9E0C24;
    --ink:#2B2B2B;
    --bg:#F7F5F5;
    --bot:#FFFFFF;
    --line:#E4DEDE;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Tajawal',system-ui,-apple-system,'Segoe UI',sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;justify-content:center;
  }
  .app{width:100%;max-width:480px;height:100dvh;display:flex;flex-direction:column;background:var(--bg)}

  header{
    background:var(--red);color:#fff;padding:13px 18px;
    display:flex;align-items:center;gap:12px;flex-shrink:0;
  }
  .avatar{
    width:46px;height:46px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .avatar img{width:28px;height:auto;display:block}
  .head-txt{line-height:1.25}
  .head-txt b{font-size:17px;font-weight:800;display:block}
  .head-txt span{font-size:12.5px;opacity:.9;display:flex;align-items:center;gap:5px}
  .dot{width:7px;height:7px;border-radius:50%;background:#8CE8AE;display:inline-block}

  #chat{flex:1;overflow-y:auto;padding:16px 14px 8px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
  .msg{max-width:88%;padding:10px 14px;border-radius:16px;font-size:15.5px;line-height:1.7;white-space:pre-line;animation:pop .22s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.msg{animation:none}}
  .bot{background:var(--bot);border:1px solid var(--line);border-start-start-radius:4px;align-self:flex-start}
  .user{background:var(--red);color:#fff;border-start-end-radius:4px;align-self:flex-end}
  .msg b{color:var(--red)} .user b{color:#FFD9DF}
  .num{direction:ltr;unicode-bidi:isolate;display:inline-block;font-weight:700}

  .site-card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:8px 0 2px;white-space:normal}
  .site-card img{width:100%;display:block}
  .site-card .cap{padding:9px 12px 11px}
  .site-card .cap b{display:block;margin-bottom:2px}
  .site-card .cap small{color:#6E6464;font-size:13px;display:block;direction:ltr;text-align:right}
  .maplink{
    display:inline-block;margin-top:8px;background:var(--red);color:#fff;
    text-decoration:none;font-weight:700;font-size:13.5px;
    padding:7px 14px;border-radius:999px;
  }
  .maplink:active{background:var(--red-dark)}

  .typing{display:flex;gap:4px;padding:14px 16px;align-self:flex-start;background:var(--bot);border:1px solid var(--line);border-radius:16px;border-start-start-radius:4px}
  .typing i{width:7px;height:7px;border-radius:50%;background:#BBADAD;animation:blink 1s infinite}
  .typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
  @keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

  #chips{display:flex;flex-wrap:wrap;gap:8px;padding:10px 14px;flex-shrink:0}
  .chip{
    border:1.5px solid var(--red);background:#fff;color:var(--red);
    border-radius:999px;padding:8px 15px;font-size:14px;font-weight:700;
    font-family:inherit;cursor:pointer;transition:background .15s,color .15s;
  }
  .chip:active,.chip:hover{background:var(--red);color:#fff}
  .chip:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .chip.cta{background:var(--red);color:#fff;border-color:var(--red)}
  .chip.cta:active,.chip.cta:hover{background:var(--red-dark)}

  footer{padding:8px 14px 12px;font-size:11.5px;color:#9B8F8F;text-align:center;flex-shrink:0}
</style>
</head>

const ORDER = ["company","job","conditions","salary","benefits","shifts","documents","apply","location"];
const chat  = document.getElementById("chat");
const chips = document.getElementById("chips");

function md(t){ return t.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>"); }

function addMsg(text, who){
  const d = document.createElement("div");
  d.className = "msg " + who;
  d.innerHTML = md(text);
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function botSay(text, done){
  const t = document.createElement("div");
  t.className = "typing"; t.innerHTML = "<i></i><i></i><i></i>";
  chat.appendChild(t); chat.scrollTop = chat.scrollHeight;
  setTimeout(()=>{ t.remove(); addMsg(text,"bot"); if(done) done(); }, 650);
}

function renderChips(){
  chips.innerHTML = "";
  ORDER.forEach(k=>{
    const b = document.createElement("button");
    b.className = "chip"; b.textContent = Q[k].label;
    b.onclick = ()=> pick(k);
    chips.appendChild(b);
  });
  const cta = document.createElement("a");
  cta.className = "chip cta";
  cta.textContent = "💬 قدم دابا عبر واتساب";
  cta.href = "https://wa.me/" + CONFIG.whatsapp + "?text=" + encodeURIComponent("السلام عليكم، بغيت نقدم لوظيفة عامل(ة) إنتاج فسوليميت. (QR)\nالإسم الكامل: ");
  cta.target = "_blank"; cta.rel = "noopener";
  cta.style.textDecoration = "none"; cta.style.display = "inline-block";
  chips.appendChild(cta);
}

function pick(k){
  addMsg(Q[k].label, "user");
  botSay(Q[k].text, ()=>{
    if(k !== "apply"){
      setTimeout(()=> botSay("واش عندك شي سؤال آخر؟ 👇"), 350);
    }
  });
}

botSay("السلام عليكم ومرحبا بيك! 👋\n\nأنا مساعد **التوظيف فسوليميت كابلاج المغرب** بطنجة.\n\nفتحنا باب الترشيح لوظيفة **عامل(ة) إنتاج** — **بلا شرط الخبرة**، مهما كان مستواك الدراسي، والتدريب مدفوع الأجر من أول نهار.\n\nاختار(ي) السؤال اللي بغيتي 👇", renderChips);
